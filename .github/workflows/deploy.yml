name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run deploy
        env:
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          CLOUDFLARE_ACCOUNT_ID: 07260ddb14ca9363767d2aee933b887f
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PORTFOLIO_GITHUB_TOKEN }}
          GITHUB_REPOSITORY: Najla-Nuricia/Portofolio-v2
          PORTFOLIO_DOMAIN: nacia.ryuko.my.id
          CF_ACCESS_AUTHOR_EMAILS: syahrul4w@gmail.com,najlalaudy@gmail.com
